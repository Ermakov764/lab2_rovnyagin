# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/lab2_db
spring.datasource.username=postgres
spring.datasource.password=lab2_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Settings
# ==========================================
# Автоматически создаёт/обновляет таблицы при старте приложения
spring.jpa.hibernate.ddl-auto=update

# Показывает SQL-запросы в консоли (удобно для отладки)
spring.jpa.show-sql=true

# Форматирует SQL для читаемости
spring.jpa.properties.hibernate.format_sql=true

# Диалект PostgreSQL (для правильной генерации SQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Server Port (опционально)
# ==========================================
server.port=8080
