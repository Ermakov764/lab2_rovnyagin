# Лаб. 7 (ТЗ): PostgreSQL + pgAdmin на отдельном узле (например hl12.zil).
# Пример: docker compose -f docker-compose.lab7-db.yml --env-file .env up -d
# Внешний порт Postgres при необходимости: POSTGRES_PUBLISH_PORT=2312 в .env

services:
  postgresdb:
    image: postgres:15-alpine
    container_name: lab7_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=1000"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab2_password}
      POSTGRES_DB: ${POSTGRES_DB:-lab2_db}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - lab7_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lab7_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_password}
    ports:
      - "${PGADMIN_PUBLISH_PORT:-15432}:80"
    depends_on:
      postgresdb:
        condition: service_healthy

volumes:
  lab7_postgres_data:
