# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/lab2_db
spring.datasource.username=postgres
spring.datasource.password=lab2_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# Проверяет соответствие сущностей существующей схеме БД
spring.jpa.hibernate.ddl-auto=validate

# SQL в консоль (в Docker по умолчанию выключается через SPRING_JPA_SHOW_SQL=false)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Форматирует SQL в логах (шум при отключённом show-sql можно выключить env-переменной)
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# Пул потоков встроенного Tomcat (в старых версиях ТЗ: server.tomcat.max-threads)
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:200}

# Диалект PostgreSQL (для правильной генерации SQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Порт всего приложения (HTML + REST + Swagger). Переопределение: SERVER_PORT=8081 или --server.port=8081
server.port=8080

# OpenAPI / Swagger UI (только REST под /api/**; HTML-страницы не попадают в спецификацию)
springdoc.paths-to-match=/api/**
