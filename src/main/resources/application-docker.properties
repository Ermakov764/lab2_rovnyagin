# Профиль docker: URL БД из DBHOST, DBPORT, DBNAME, SCHEMANAME (лаб. 7, ТЗ).
# В docker-compose задаются переменные окружения; при необходимости переопределите spring.datasource.url целиком через SPRING_DATASOURCE_URL.
spring.datasource.url=jdbc:postgresql://${DBHOST:postgresdb}:${DBPORT:5432}/${DBNAME:lab2_db}?currentSchema=${SCHEMANAME:public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lab2_password}
