# Профиль docker: хост БД — имя сервиса Compose.
# Явные URL/логин/пароль задаются в docker-compose через переменные окружения
# (SPRING_DATASOURCE_*), они имеют приоритет над значениями ниже.
spring.datasource.url=jdbc:postgresql://postgresdb:5432/lab2_db
spring.datasource.username=postgres
spring.datasource.password=lab2_password
