spring.datasource.url=jdbc:h2:mem:lab2test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Без Flyway: V2 вызывает setval (PostgreSQL), на H2 падает. Схема создаётся из сущностей.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

server.port=0
