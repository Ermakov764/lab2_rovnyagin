# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/lab2_db
spring.datasource.username=postgres
spring.datasource.password=lab2_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# Проверяет соответствие сущностей существующей схеме БД
spring.jpa.hibernate.ddl-auto=validate

# Показывает SQL-запросы в консоли
spring.jpa.show-sql=true

# Форматирует SQL для читаемости
spring.jpa.properties.hibernate.format_sql=true

# Диалект PostgreSQL (для правильной генерации SQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080
